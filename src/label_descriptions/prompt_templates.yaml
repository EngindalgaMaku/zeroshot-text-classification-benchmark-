version: "final_v2"
language: "en"
notes:
  - "temperature=0 for reproducibility"
  - "No content examples in prompts — format constraints only (avoids prompt leakage)"
  - "Output MUST start with label name, be 10-35 words, no banned patterns"

supported_task_types:
  - topic
  - entity
  - sentiment
  - emotion
  - intent
  - newsgroup

templates:
  topic:
    l2: |
      Complete this sentence for the news topic "{label_name}":
      "{label_name}: news about ___"
      Fill in the blank with 4-8 specific, distinct keywords (comma-separated noun phrases).
      The output MUST start with "{label_name}:" and be a single compact sentence.
      Output ONLY the completed sentence. Nothing else.
    l3: |
      Write exactly 3 sentences for the news topic "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact phrase.
      Use these patterns (one per sentence, each with different keywords):
        "{label_name}: news about X, Y, and Z."
        "{label_name}: coverage of X, Y, and Z."
        "{label_name}: reporting on X, Y, and Z."
      Rules:
      - Each sentence must use different keywords from the others.
      - Each sentence must be 10-20 words.
      - Do NOT repeat keywords across sentences.
      Output ONLY the 3 sentences, one per line. Nothing else.

  entity:
    l2: |
      Complete this sentence for the entity type "{label_name}":
      "{label_name}: a ___ that ___"
      Fill in with a compact noun phrase + verb phrase (total sentence 10-20 words).
      The output MUST start with "{label_name}:" and be a single compact definitional sentence.
      Output ONLY the completed sentence. Nothing else.
    l3: |
      Write exactly 3 sentences defining the entity type "{label_name}".
      Each sentence MUST start with "{label_name}:" and be 10-20 words.
      Use different angles for each sentence: (1) what it is, (2) what it does, (3) how it is structured.
      Rules:
      - Each sentence must use different keywords from the others.
      - Do NOT use phrases like "this category", "refers to", "such as", "for example".
      Output ONLY the 3 sentences, one per line. Nothing else.

  sentiment:
    l2: |
      Complete this sentence for the sentiment label "{label_name}":
      "{label_name}: text expressing ___"
      Fill in with 4-7 specific emotional or evaluative keywords (comma-separated).
      The output MUST start with "{label_name}:" and be a single compact sentence.
      Output ONLY the completed sentence. Nothing else.
    l3: |
      Write exactly 3 sentences for the sentiment label "{label_name}".
      Each sentence MUST start with "{label_name}:" and be 10-20 words.
      Use different angles for each sentence: (1) emotional tone, (2) linguistic markers, (3) evaluative stance.
      Rules:
      - Each sentence must use different keywords from the others.
      - Do NOT use phrases like "this category", "refers to", "such as", "for example".
      Output ONLY the 3 sentences, one per line. Nothing else.

  emotion:
    l2: |
      Complete this sentence for the emotion "{label_name}":
      "{label_name}: an emotional state of ___"
      Fill in with 4-7 specific psychological or affective keywords (comma-separated).
      The output MUST start with "{label_name}:" and be a single compact sentence.
      Output ONLY the completed sentence. Nothing else.
    l3: |
      Write exactly 3 sentences for the emotion "{label_name}".
      Each sentence MUST start with "{label_name}:" and be 10-20 words.
      Use different angles for each sentence: (1) internal feeling, (2) outward expression, (3) situational trigger.
      Rules:
      - Each sentence must use different keywords from the others.
      - Do NOT use phrases like "this category", "refers to", "such as", "for example".
      Output ONLY the 3 sentences, one per line. Nothing else.

  intent:
    l2: |
      Complete this sentence for the user intent "{label_name}":
      "{label_name}: the user wants to ___"
      Fill in with a specific action description (total sentence 10-20 words).
      The output MUST start with "{label_name}:" and be a single compact sentence.
      Output ONLY the completed sentence. Nothing else.
    l3: |
      Write exactly 3 sentences for the user intent "{label_name}".
      Each sentence MUST start with "{label_name}:" and be 10-20 words.
      Use different angles for each sentence: (1) user goal, (2) specific action taken, (3) context or reason.
      Rules:
      - Each sentence must use different keywords from the others.
      - Do NOT use phrases like "this category", "refers to", "such as", "for example".
      Output ONLY the 3 sentences, one per line. Nothing else.

  newsgroup:
    l2: |
      Complete this sentence for the online discussion group "{label_name}":
      "{label_name}: posts about ___"
      Fill in the blank with 4-8 specific, distinct keywords (comma-separated noun phrases).
      The output MUST start with "{label_name}:" and be a single compact sentence.
      Output ONLY the completed sentence. Nothing else.
    l3: |
      Write exactly 3 sentences for the online discussion group "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact phrase.
      Use these patterns (one per sentence, each with different keywords):
        "{label_name}: posts about X, Y, and Z."
        "{label_name}: discussions of X, Y, and Z."
        "{label_name}: threads on X, Y, and Z."
      Rules:
      - Each sentence must use different keywords from the others.
      - Each sentence must be 10-20 words.
      - Do NOT repeat keywords across sentences.
      Output ONLY the 3 sentences, one per line. Nothing else.
