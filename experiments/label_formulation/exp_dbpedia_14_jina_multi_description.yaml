dataset:
  label_column: label
  max_samples: 1000
  name: dbpedia_14
  split: test
  text_column: content
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: dbpedia_14_jina_multi_description
models:
  biencoder:
    name: jinaai/jina-embeddings-v3
    provider: hf
  reranker: null
output:
  output_dir: results/label_semantics
  save_metrics: true
  save_predictions: true
pipeline:
  batch_size: 8
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: multi_description
  language: en
  type: zero_shot_classification
