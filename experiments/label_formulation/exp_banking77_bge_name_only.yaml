experiment_name: banking77_bge_name_only
dataset:
  name: banking77
  split: test
  text_column: text
  label_column: label
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: name_only  # Label formulation experiment: comparing name_only vs description
  language: en
models:
  biencoder:
    provider: hf
    name: BAAI/bge-m3
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 16
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
