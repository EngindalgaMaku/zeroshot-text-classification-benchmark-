experiment_name: yahoo_answers_topics_e5_description
dataset:
  name: yahoo_answers_topics
  split: test
  text_column: best_answer
  label_column: topic
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: description
  language: en
models:
  biencoder:
    provider: hf
    name: intfloat/multilingual-e5-large
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 16
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
