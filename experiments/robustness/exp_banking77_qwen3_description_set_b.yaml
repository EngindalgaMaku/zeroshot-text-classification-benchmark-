dataset:
  label_column: label
  max_samples: 1000
  name: banking77
  split: test
  text_column: text
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: banking77_qwen3_description_set_b
models:
  biencoder:
    name: Qwen/Qwen3-Embedding-8B
