experiment_name: full_yahoo_answers_topics_qwen3_name_only
dataset:
  name: yahoo_answers_topics
  split: test
  text_column: best_answer
  label_column: topic
  max_samples: null
task:
  type: zero_shot_classification
  label_mode: name_only
  language: en
models:
  biencoder:
    provider: hf
    name: Qwen/Qwen3-Embedding
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 32
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: false
  save_metrics: true
  output_dir: results/full_label_descriptions
