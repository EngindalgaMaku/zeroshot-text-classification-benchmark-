dataset:
  label_column: label
  max_samples: 1000
  name: ag_news
  split: test
  text_column: text
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: ag_news_mpnet_description_set_b
models:
  biencoder:
    name: sentence-transformers/all-mpnet-base-v2
    provider: hf
  reranker: null
output:
  output_dir: results/robustness
  save_metrics: true
  save_predictions: true
pipeline:
  batch_size: 16
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: description_set_b
  language: en
  type: zero_shot_classification
