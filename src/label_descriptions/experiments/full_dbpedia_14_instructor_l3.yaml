experiment_name: full_dbpedia_14_instructor_l3
dataset:
  name: dbpedia_14
  split: test
  text_column: content
  label_column: label
  max_samples: null
task:
  type: zero_shot_classification
  label_mode: l3
  language: en
models:
  biencoder:
    provider: hf
    name: hkunlp/instructor-large
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 16
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: false
  save_metrics: true
  output_dir: results/full_label_descriptions
