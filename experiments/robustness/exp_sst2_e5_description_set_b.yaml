dataset:
  label_column: label
  max_samples: 1000
  name: sst2
  split: validation
  text_column: sentence
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: sst2_e5_description_set_b
models:
  biencoder:
    name: intfloat/multilingual-e5-large
    provider: hf
  reranker: null
output:
  output_dir: results/robustness
  save_metrics: true
  save_predictions: true
pipeline:
  batch_size: 8
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: description_set_b
  language: en
  type: zero_shot_classification
