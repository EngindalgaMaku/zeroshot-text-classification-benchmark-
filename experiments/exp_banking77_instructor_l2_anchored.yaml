experiment_name: exp_banking77_instructor_l2_anchored
dataset:
  name: banking77
  split: test
  text_column: text
  label_column: label
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: l2_anchored
  language: en
models:
  biencoder:
    provider: hf
    name: hkunlp/instructor-large
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 32
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw/label_semantics
