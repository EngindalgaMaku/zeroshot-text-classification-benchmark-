experiment_name: twitter_financial_mpnet_3shot

dataset:
  name: zeroshot/twitter-financial-news-sentiment
  split: validation
  text_column: text
  label_column: label
  max_samples: 2000

task:
  type: zero_shot_classification
  label_mode: description
  language: en

models:
  biencoder:
    provider: hf
    name: sentence-transformers/all-mpnet-base-v2
  reranker: null

pipeline:
  mode: biencoder
  normalize_embeddings: true
  few_shot:
    enabled: true
    n_shots: 3
    seed: 42

evaluation:
  metrics:
    - accuracy
    - macro_f1
    - per_class_f1

output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw