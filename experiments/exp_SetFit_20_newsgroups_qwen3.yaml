experiment_name: exp_SetFit_20_newsgroups_qwen3
dataset:
  name: SetFit/20_newsgroups
  split: test
  text_column: text
  label_column: label
  max_samples: 2000
task:
  type: zero_shot_classification
  label_mode: description
  language: en
models:
  biencoder:
    provider: hf
    name: Qwen/Qwen3-Embedding-4B
    max_seq_length: 512
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 4
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
