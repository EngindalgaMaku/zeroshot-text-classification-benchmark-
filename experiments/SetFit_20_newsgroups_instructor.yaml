dataset:
  label_column: label
  # Larger sample size for 20 Newsgroups due to higher class count (20 classes)
  max_samples: 2000
  name: SetFit/20_newsgroups
  split: test
  text_column: text
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: SetFit_20_newsgroups_instructor
models:
  biencoder:
    name: hkunlp/instructor-large
    provider: hf
  reranker: null
output:
  output_dir: results/raw
  save_metrics: true
  save_predictions: true
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 16
task:
  label_mode: description
  language: en
  type: zero_shot_classification
