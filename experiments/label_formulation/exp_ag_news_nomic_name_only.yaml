experiment_name: ag_news_nomic_name_only
dataset:
  name: ag_news
  split: test
  text_column: text
  label_column: label
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: name_only
  language: en
models:
  biencoder:
    provider: hf
    name: nomic-ai/nomic-embed-text-v2-moe
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 16
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
