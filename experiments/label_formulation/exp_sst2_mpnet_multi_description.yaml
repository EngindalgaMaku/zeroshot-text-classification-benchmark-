dataset:
  label_column: label
  max_samples: 1000
  name: sst2
  split: validation
  text_column: sentence
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: sst2_mpnet_multi_description
models:
  biencoder:
    name: sentence-transformers/all-mpnet-base-v2
    provider: hf
  reranker: null
output:
  output_dir: results/label_semantics
  save_metrics: true
  save_predictions: true
pipeline:
  batch_size: 16
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: multi_description
  language: en
  type: zero_shot_classification
