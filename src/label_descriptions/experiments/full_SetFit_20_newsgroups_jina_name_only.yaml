experiment_name: full_SetFit_20_newsgroups_jina_name_only
dataset:
  name: SetFit/20_newsgroups
  split: test
  text_column: text
  label_column: label
  max_samples: null
task:
  type: zero_shot_classification
  label_mode: name_only
  language: en
models:
  biencoder:
    provider: hf
    name: jinaai/jina-embeddings-v3
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 32
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: false
  save_metrics: true
  output_dir: results/full_label_descriptions
