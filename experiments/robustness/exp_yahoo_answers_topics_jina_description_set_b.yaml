dataset:
  label_column: topic
  max_samples: 1000
  name: yahoo_answers_topics
  split: test
  text_column: best_answer
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: yahoo_answers_topics_jina_description_set_b
models:
  biencoder:
    name: jinaai/jina-embeddings-v3
    provider: hf
  reranker: null
output:
  output_dir: results/robustness
  save_metrics: true
  save_predictions: true
pipeline:
  batch_size: 8
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: description_set_b
  language: en
  type: zero_shot_classification
