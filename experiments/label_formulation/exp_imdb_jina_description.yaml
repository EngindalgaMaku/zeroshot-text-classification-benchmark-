experiment_name: imdb_jina_description
dataset:
  name: imdb
  split: test
  text_column: text
  label_column: label
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: description
  language: en
models:
  biencoder:
    provider: hf
    name: jinaai/jina-embeddings-v3
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 8
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
