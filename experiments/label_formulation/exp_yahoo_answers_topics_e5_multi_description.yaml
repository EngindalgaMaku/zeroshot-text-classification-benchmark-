dataset:
  label_column: topic
  max_samples: 1000
  name: yahoo_answers_topics
  split: test
  text_column: best_answer
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: yahoo_answers_topics_e5_multi_description
models:
  biencoder:
    name: intfloat/multilingual-e5-large
    provider: hf
  reranker: null
output:
  output_dir: results/label_semantics
  save_metrics: true
  save_predictions: true
pipeline:
  batch_size: 8
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: multi_description
  language: en
  type: zero_shot_classification
