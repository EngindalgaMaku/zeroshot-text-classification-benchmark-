experiment_name: exp_zeroshot_twitter_financial_news_sentiment_bge
dataset:
  name: zeroshot/twitter-financial-news-sentiment
  split: validation
  text_column: text
  label_column: label
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: description
  language: en
models:
  biencoder:
    provider: hf
    name: BAAI/bge-m3
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 32
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
