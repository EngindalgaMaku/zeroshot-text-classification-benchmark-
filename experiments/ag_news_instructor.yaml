dataset:
  label_column: label
  max_samples: 1000
  name: ag_news
  split: test
  text_column: text
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
experiment_name: ag_news_instructor
models:
  biencoder:
    name: hkunlp/instructor-large
    provider: hf
  reranker: null
output:
  output_dir: results/raw
  save_metrics: true
  save_predictions: true
pipeline:
  mode: biencoder
  normalize_embeddings: true
task:
  label_mode: description
  language: en
  type: zero_shot_classification
