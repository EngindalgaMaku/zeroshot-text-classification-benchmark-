experiment_name: dbpedia_14_qwen3_name_only
dataset:
  name: dbpedia_14
  split: test
  text_column: content
  label_column: label
  max_samples: 1000
task:
  type: zero_shot_classification
  label_mode: name_only
  language: en
models:
  biencoder:
    provider: hf
    name: Qwen/Qwen3-Embedding-8B
  reranker: null
pipeline:
  mode: biencoder
  normalize_embeddings: true
  batch_size: 16
evaluation:
  metrics:
  - accuracy
  - macro_f1
  - per_class_f1
output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
