experiment_name: ag_news_bge_reranker_test

dataset:
  name: ag_news
  split: test
  text_column: text
  label_column: label
  max_samples: 100  # Small test

task:
  type: zero_shot_classification
  label_mode: description
  language: en

models:
  reranker:
    provider: hf
    name: BAAI/bge-reranker-v2-m3

pipeline:
  mode: reranker

evaluation:
  metrics:
    - accuracy
    - macro_f1
    - per_class_f1

output:
  save_predictions: true
  save_metrics: true
  output_dir: results/raw
