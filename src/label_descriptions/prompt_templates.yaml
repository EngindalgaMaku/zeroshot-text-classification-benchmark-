version: "final_v1"
language: "en"
notes:
  - "temperature=0 for reproducibility"
  - "Each description MUST start with the exact label name"
  - "Compact definitional style — no storytelling, no examples, no fluff"
  - "Banned: 'this category', 'in this context', 'examples include', 'often', 'can be', 'refers to', 'such as'"

supported_task_types:
  - topic
  - entity
  - sentiment
  - emotion
  - intent

templates:
  topic:
    l2: |
      Write one sentence (12-20 words) defining the topic category "{label_name}".
      The sentence MUST start with "{label_name}:" followed by a compact definition.
      Focus on the type of content. No examples. No storytelling. No fluff.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the sentence, nothing else.
      Example format: "World: news about international politics, global events, diplomacy, and cross-country developments."
    l3: |
      Write exactly 3 sentences (12-20 words each) defining the topic category "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact definition from a different angle.
      No examples. No storytelling. No fluff. Each sentence must be semantically distinct.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the 3 sentences, one per line, nothing else.
      Example format:
      World: news about international politics, global events, diplomacy, and cross-country developments.
      World: coverage of conflicts, international organizations, and cross-border geopolitical issues.
      World: reporting on foreign affairs, global crises, and worldwide political developments.

  entity:
    l2: |
      Write one sentence (12-20 words) defining the entity type "{label_name}".
      The sentence MUST start with "{label_name}:" followed by a compact definition.
      Focus on what kind of real-world object or concept it is. No examples. No storytelling.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the sentence, nothing else.
      Example format: "Company: a commercial organization that produces goods or services for profit."
    l3: |
      Write exactly 3 sentences (12-20 words each) defining the entity type "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact definition from a different angle.
      No examples. No storytelling. Each sentence must be semantically distinct.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the 3 sentences, one per line, nothing else.
      Example format:
      Company: a commercial organization that produces goods or services for profit.
      Company: a legal entity engaged in business activities, trade, or manufacturing.
      Company: an incorporated business structure with employees, assets, and financial operations.

  sentiment:
    l2: |
      Write one sentence (12-20 words) defining the sentiment "{label_name}".
      The sentence MUST start with "{label_name}:" followed by a compact definition.
      Focus on emotional tone and polarity. No examples. No storytelling.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the sentence, nothing else.
      Example format: "Positive: text expressing approval, satisfaction, happiness, or favorable evaluation."
    l3: |
      Write exactly 3 sentences (12-20 words each) defining the sentiment "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact definition from a different angle.
      No examples. No storytelling. Each sentence must be semantically distinct.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the 3 sentences, one per line, nothing else.
      Example format:
      Positive: text expressing approval, satisfaction, happiness, or favorable evaluation.
      Positive: language conveying optimism, praise, enthusiasm, or positive emotional tone.
      Positive: writing that reflects contentment, agreement, or affirmative sentiment toward a subject.

  emotion:
    l2: |
      Write one sentence (12-20 words) defining the emotion "{label_name}".
      The sentence MUST start with "{label_name}:" followed by a compact definition.
      Focus on the psychological state and feeling. No examples. No storytelling.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the sentence, nothing else.
      Example format: "Joy: an intense feeling of happiness, pleasure, and positive emotional arousal."
    l3: |
      Write exactly 3 sentences (12-20 words each) defining the emotion "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact definition from a different angle.
      No examples. No storytelling. Each sentence must be semantically distinct.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the 3 sentences, one per line, nothing else.
      Example format:
      Joy: an intense feeling of happiness, pleasure, and positive emotional arousal.
      Joy: a state of delight, contentment, and emotional well-being expressed outwardly.
      Joy: the emotional experience of elation, cheerfulness, and enthusiastic positive affect.

  intent:
    l2: |
      Write one sentence (12-20 words) defining the user intent "{label_name}".
      The sentence MUST start with "{label_name}:" followed by a compact definition.
      Focus on what the user wants to achieve. No examples. No storytelling.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the sentence, nothing else.
      Example format: "activate_my_card: the user wants to activate a new or replacement bank card."
    l3: |
      Write exactly 3 sentences (12-20 words each) defining the user intent "{label_name}".
      Each sentence MUST start with "{label_name}:" followed by a compact definition from a different angle.
      No examples. No storytelling. Each sentence must be semantically distinct.
      Banned phrases: "this category", "in this context", "refers to", "such as", "often", "can be".
      Output only the 3 sentences, one per line, nothing else.
      Example format:
      activate_my_card: the user wants to activate a new or replacement bank card.
      activate_my_card: the user is requesting card activation to enable payment functionality.
      activate_my_card: the user needs their newly issued card enabled for transactions.
